# RUTRIX — Render free tier (Python native, no Docker / no card)
services:
  - type: web
    name: rutrix
    runtime: python
    repo: https://github.com/rashanofal/RUTRIX
    branch: main
    plan: free
    buildCommand: chmod +x build.sh start.sh && ./build.sh
    startCommand: ./start.sh
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////opt/render/project/src/data/pothole.db
      - key: MODEL_PATH
        value: ../ml/models/pothole_yolov8n.pt
      - key: UPLOAD_DIR
        value: ../data/uploads
      - key: TRAINING_DIR
        value: ../data/training
      - key: CORS_ORIGINS
        value: "*"
      - key: SEED_DEMO_ACCOUNT
        value: "true"
      - key: CONFIDENCE_THRESHOLD
        value: "0.55"

# RUTRIX — نشر سحابي على Render.com
services:
  - type: web
    name: rutrix
    runtime: docker
    repo: https://github.com/rashanofal/RUTRIX
    branch: main
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////app/data/pothole.db
      - key: MODEL_PATH
        value: /app/ml/models/pothole_yolov8n.pt
      - key: UPLOAD_DIR
        value: /app/data/uploads
      - key: TRAINING_DIR
        value: /app/data/training
      - key: CORS_ORIGINS
        value: "*"
      - key: SEED_DEMO_ACCOUNT
        value: "true"
      - key: CONFIDENCE_THRESHOLD
        value: "0.55"
